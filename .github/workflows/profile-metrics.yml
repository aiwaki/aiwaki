name: Profile metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update README metrics
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 scripts/update_profile_metrics.py

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No profile metric changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/daily-banner.svg
          git commit -m "Update profile metrics"
          git push
